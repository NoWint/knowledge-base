name = "knowledge-base-api"
main = "src/workers/index.ts"
compatibility_date = "2024-01-01"

[env.production]
vars = { ENVIRONMENT = "production" }

[[kv_namespaces]]
binding = "USERS_KV"
id = "your-kv-namespace-id"

[[kv_namespaces]]
binding = "SYNC_KV"
id = "your-sync-kv-namespace-id"

[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "your-subscriptions-kv-namespace-id"

[[d1_databases]]
binding = "DB"
database_name = "knowledge-base"
database_id = "your-d1-database-id"

[triggers]
crons = ["0 0 * * *"]

[observability]
enabled = true
